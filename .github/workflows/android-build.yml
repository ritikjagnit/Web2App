name: Build Android APK/AAB

on:
  repository_dispatch:
    types: [build-android-app]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Node Dependencies
        run: |
          npm install
          cd backend && npm install

      - name: Configure Android App Workspace
        env:
          BUILD_ID: ${{ github.event.client_payload.buildId }}
          APP_NAME: ${{ github.event.client_payload.config.appName }}
          SHORT_NAME: ${{ github.event.client_payload.config.shortName }}
          THEME_COLOR: ${{ github.event.client_payload.config.themeColor }}
          BACKGROUND_COLOR: ${{ github.event.client_payload.config.backgroundColor }}
          SOURCE_TYPE: ${{ github.event.client_payload.config.sourceType }}
          HTML_CONTENT: ${{ github.event.client_payload.config.htmlContent }}
          ICON_URL: ${{ github.event.client_payload.config.iconUrl }}
          CACHE_STRATEGY: ${{ github.event.client_payload.config.cacheStrategy }}
          ANDROID_BUILD_FORMAT: ${{ github.event.client_payload.config.androidBuildFormat }}
          WEBSITE_URL: ${{ github.event.client_payload.config.websiteUrl }}
        run: |
          node backend/scripts/github-build-helper.js

      - name: Build Android App (APK/AAB)
        run: |
          cd output/workspace/${{ github.event.client_payload.buildId }}/android
          chmod +x gradlew
          if [ "${{ github.event.client_payload.config.androidBuildFormat }}" = "aab" ]; then
            ./gradlew bundleDebug
          else
            ./gradlew assembleDebug
          fi

      - name: Upload Package back to GoViralHost
        env:
          BUILD_ID: ${{ github.event.client_payload.buildId }}
          ANDROID_BUILD_FORMAT: ${{ github.event.client_payload.config.androidBuildFormat }}
          CALLBACK_URL: ${{ github.event.client_payload.config.callbackUrl }}
          CALLBACK_SECRET: ${{ secrets.BUILD_CALLBACK_SECRET }}
        run: |
          BUILD_DIR="output/workspace/${BUILD_ID}"
          if [ "${ANDROID_BUILD_FORMAT}" = "aab" ]; then
            FILE_PATH="${BUILD_DIR}/android/app/build/outputs/bundle/debug/app-debug.aab"
          else
            FILE_PATH="${BUILD_DIR}/android/app/build/outputs/apk/debug/app-debug.apk"
          fi
          
          echo "Uploading $FILE_PATH to $CALLBACK_URL..."
          curl -X POST \
            -H "Authorization: Bearer ${CALLBACK_SECRET}" \
            -F "file=@${FILE_PATH}" \
            -F "status=success" \
            "${CALLBACK_URL}"
