name: Build iOS IPA

on:
  repository_dispatch:
    types: [build-ios-app]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Create Simulated IPA Package
        run: |
          mkdir -p Payload/App.app
          echo "Simulated App Bundle for Web2App Demo" > Payload/App.app/Info.plist
          zip -r app-release.ipa Payload

      - name: Upload Package back to GoViralHost
        env:
          BUILD_ID: ${{ github.event.client_payload.buildId }}
          CALLBACK_URL: ${{ github.event.client_payload.config.callbackUrl }}
          CALLBACK_SECRET: ${{ secrets.BUILD_CALLBACK_SECRET }}
        run: |
          FILE_PATH="app-release.ipa"
          echo "Uploading $FILE_PATH to $CALLBACK_URL..."
          curl -X POST \
            -H "Authorization: Bearer ${CALLBACK_SECRET}" \
            -F "file=@${FILE_PATH}" \
            -F "status=success" \
            "${CALLBACK_URL}"
